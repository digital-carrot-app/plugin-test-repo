name: Location
description: Create goals that require you to physically be in a specific location.
minimumAppVersion: v1.2.0
imports:
  geofence:
    location:
dataPlugin:
  exports:
    location:
      name: Location
      description: Returns how long you spend in a specific location
      outputSchema: locationOut
      paramsSchema: locationCFG
  quickstarts:
    time_in_location:
      name: Spent time in a Location
      description: Spent a certain amount of time in a location based on your phone's GPS
      userInputSchema: time_in_location_qs
      functionId: location
      functionParamExpr: "{location: qs.cfg.location}"
      expressionTemplate: "$qs.data.location.time_in_location >= $qs.cfg.time_to_spend"

schemas:
  time_in_location_qs:
    type_input: object
    properties:
      location:
        metadata:
          locationPicker:
      time_to_spend:
        type_input: number
        title: Minutes to Spend
        description: How many minutes would you like to spend in your selected location?
  locationCFG:
    type_input: object
    properties:
      location:
        metadata:
          locationPicker:

  locationOut:
    type_input: object
    properties:
      is_in_location:
        type_input: boolean
        title: Currently In Location
        description: Returns true of the user is currently in the geofenced area.
      time_in_location:
        type_input: number
        title: Time Spent in Location
        description: The amount of time that the user has spent in the geofenced area.
        metadata:
          unit: minutes
      time_outside_location:
        type_input: number
        title: Time Spent outside Location
        description: The amount of time that the user has spent outside of the geofenced area.
        metadata:
          unit: minutes
      exit_events:
        type_input: integer
        title: Times Exited Area
        description: The number of times the user has has left the area.

      enter_events:
        type_input: integer
        title: Times Entered Area
        description: The number of times the user has has entered the area.
